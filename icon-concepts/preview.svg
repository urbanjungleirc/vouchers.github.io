      <rect x="39" y="24" width="172" height="104" rx="20" fill="#f7e9ea"/>
      <image x="63" y="12" width="124" height="124" href="cta-ticket-present.svg"/>
      <text x="125" y="146" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="750" fill="#111827">Ticket + Present</text>
      <text x="125" y="170" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#6b7280">voucher badge option</text>
    </g>

    <g transform="translate(588)">
      <rect width="250" height="220" rx="18" fill="#fff" filter="url(#shadow)"/>
      <rect x="39" y="18" width="172" height="116" rx="22" fill="#f7e9ea"/>
      <image x="61" y="8" width="128" height="128" href="cta-sun-mountains.svg"/>
